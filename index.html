<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nothing Firmware Updater</title>
    <style>
        /* Modern Nothing-style Dark Theme */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #0a0a0a; 
            color: #e0e0e0; 
            margin: 0; 
            padding: 40px 20px; 
        }
        .container { 
            max-width: 850px; 
            margin: 0 auto; 
            background: #141414; 
            padding: 30px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); 
            border: 1px solid #222;
        }
        h1 { color: #ffffff; border-bottom: 1px solid #333; padding-bottom: 15px; margin-top: 0; }
        
        .main-ota-container { margin: 25px 0; text-align: center; background: #1a201c; padding: 25px; border-radius: 12px; border: 1px dashed #2ea043; display: none; }
        .highlight-btn { background: #238636; color: #ffffff; text-decoration: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; font-size: 16px; display: inline-block; transition: 0.2s; }
        .highlight-btn:hover { background: #2ea043; box-shadow: 0 0 15px rgba(46, 160, 67, 0.4); }
        
        h3 { color: #aaaaaa; font-size: 16px; margin-top: 30px; }
        .fingerprint-box { background: #000; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 13px; color: #777; max-height: 150px; overflow-y: auto; border: 1px solid #2a2a2a; white-space: pre-wrap; line-height: 1.5; }
        .normal-link { color: #58a6ff; text-decoration: none; }
        .normal-link:hover { text-decoration: underline; }
        
        .asset-item { display: flex; justify-content: space-between; align-items: center; background: #1a1a1a; padding: 15px; border-radius: 8px; border: 1px solid #2a2a2a; margin-bottom: 10px; }
        .asset-name { font-weight: 600; color: #e0e0e0; text-decoration: none; font-size: 14px; }
        .asset-meta { font-size: 12px; color: #888; margin-top: 4px; }
        .download-btn { background: #e5e5e5; color: #000; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-size: 13px; font-weight: bold; transition: 0.2s; }
        .download-btn:hover { background: #fff; }
        .error-box { background: #3a1d1d; border: 1px solid #ff5555; color: #ffaaaa; padding: 20px; border-radius: 8px; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="release-header">Loading Firmware...</h1>
        
        <div id="main-ota-container" class="main-ota-container"></div>
        
        <h3>Technical Details (Fingerprints)</h3>
        <div class="fingerprint-box" id="fingerprints">Fetching details from GitHub...</div>

        <h3>Assets</h3>
        <div id="assets-container"></div>
    </div>

    <script>
        // 1. URL se "tag" nikalne ka Jaduu
        const urlParams = new URLSearchParams(window.location.search);
        const currentTag = urlParams.get('tag'); // URL me jo ?tag= ke baad likha hoga, wo yahan aayega

        // Agar user ne URL me koi tag nahi daala hai
        if (!currentTag) {
            document.getElementById('release-header').innerText = 'No Version Selected';
            document.getElementById('fingerprints').innerHTML = `
                <div class="error-box">
                    <h3>Tag Missing!</h3>
                    Please add a tag parameter to your URL.<br><br>
                    <strong>Example:</strong><br>
                    ?tag=Tetris_B4.0-260225-1904
                </div>`;
            document.getElementById('assets-container').innerHTML = '';
        } 
        // Agar tag majood hai, toh fetch karo
        else {
            const apiUrl = `https://api.github.com/repos/spike0en/nothing_archive/releases/tags/${currentTag}`;

            fetch(apiUrl)
                .then(response => {
                    if (!response.ok) throw new Error('Release not found or API limit reached');
                    return response.json();
                })
                .then(data => {
                    const titleText = data.name || data.tag_name;
                    
                    // Update Page Title
                    document.title = `${titleText} - Nothing Firmware`;
                    
                    // Set Header Link
                    document.getElementById('release-header').innerHTML = `<a href="${data.html_url}" target="_blank" style="color:#fff; text-decoration:none;">${titleText} <span style="font-size: 16px; color: #888;">(full)</span></a>`;

                    // Parse Body and Extract Main OTA Link
                    let bodyText = data.body || 'No description available.';
                    let mainOtaHtml = '';

                    bodyText = bodyText.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (match, text, url) => {
                        // Agar tag name match hota hai, toh button bana do
                        if (text.trim() === titleText.trim()) {
                            mainOtaHtml = `
                                <p style="color: #888; margin-top: 0; font-size: 14px;">Main OTA File for this version:</p>
                                <a href="${url}" class="highlight-btn" target="_blank">
                                    ⬇️ Download ${text} (Full OTA)
                                </a>
                            `;
                            // Original text ki jagah chhota message
                            return `<span style="color:#2ea043; font-weight: bold;">[Link Extracted to Main Button Above]</span>`;
                        } else {
                            // Purane versions ke update path blue links rahenge
                            return `<a href="${url}" class="normal-link" target="_blank">${text}</a>`;
                        }
                    });

                    // Show Main OTA Button if found
                    const mainContainer = document.getElementById('main-ota-container');
                    if (mainOtaHtml !== '') {
                        mainContainer.innerHTML = mainOtaHtml;
                        mainContainer.style.display = 'block';
                    }

                    // Render Fingerprints
                    document.getElementById('fingerprints').innerHTML = bodyText;

                    // Render Assets List
                    const assetsContainer = document.getElementById('assets-container');
                    assetsContainer.innerHTML = ''; 
                    
                    if(data.assets && data.assets.length > 0) {
                        data.assets.forEach(asset => {
                            const sizeMB = (asset.size / (1024 * 1024)).toFixed(2);
                            assetsContainer.innerHTML += `
                                <div class="asset-item">
                                    <div>
                                        <div class="asset-name">${asset.name}</div>
                                        <div class="asset-meta">${sizeMB} MB • ${asset.download_count} downloads</div>
                                    </div>
                                    <a href="${asset.browser_download_url}" class="download-btn" target="_blank">Download</a>
                                </div>
                            `;
                        });
                    } else {
                        assetsContainer.innerHTML = '<p style="color: #888;">No files attached to this release.</p>';
                    }
                })
                .catch(error => {
                    document.getElementById('release-header').innerText = 'Error';
                    document.getElementById('fingerprints').innerHTML = `<div class="error-box">Error fetching data for <b>${currentTag}</b>.<br>Please check if the tag name is correct.</div>`;
                    console.error('Fetch Error:', error);
                });
        }
    </script>
</body>
</html>
